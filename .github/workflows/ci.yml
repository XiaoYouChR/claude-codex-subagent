name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifest, frontmatter, scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin.json is valid JSON
        run: |
          python3 -c "import json, sys; json.load(open('.claude-plugin/plugin.json')); print('plugin.json: OK')"

      - name: Validate SKILL.md has YAML frontmatter
        run: |
          python3 <<'PY'
          import sys
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml
          path = "skills/codex-subagent/SKILL.md"
          content = open(path, encoding="utf-8").read()
          if not content.startswith("---"):
              print(f"FAIL: {path} missing opening frontmatter delimiter", file=sys.stderr)
              sys.exit(1)
          end = content.find("\n---", 3)
          if end == -1:
              print(f"FAIL: {path} missing closing frontmatter delimiter", file=sys.stderr)
              sys.exit(1)
          fm = yaml.safe_load(content[3:end])
          required = ["name", "description"]
          for k in required:
              if k not in fm:
                  print(f"FAIL: {path} frontmatter missing required key '{k}'", file=sys.stderr)
                  sys.exit(1)
          print(f"{path}: frontmatter OK (name={fm['name']})")
          PY

      - name: Validate all persona files
        run: |
          python3 <<'PY'
          import os, sys
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml
          bad = 0
          found_code_writer = False
          for fn in sorted(os.listdir("personas")):
              if not fn.endswith(".md") or fn == "README.md":
                  continue
              path = os.path.join("personas", fn)
              content = open(path, encoding="utf-8").read()
              if not content.startswith("---"):
                  print(f"FAIL: {path} missing frontmatter", file=sys.stderr)
                  bad += 1
                  continue
              end = content.find("\n---", 3)
              if end == -1:
                  print(f"FAIL: {path} unclosed frontmatter", file=sys.stderr)
                  bad += 1
                  continue
              fm = yaml.safe_load(content[3:end])
              for k in ("persona", "sandbox", "effort", "when-to-use"):
                  if k not in fm:
                      print(f"FAIL: {path} frontmatter missing '{k}'", file=sys.stderr)
                      bad += 1
              if fm.get("persona") == "code-writer":
                  found_code_writer = True
                  # code-writer carries Codex-facing contract markers AND the
                  # 8-section brief / 5-section report schema documentation.
                  required_markers = ("<!-- CODEX_CONTRACT_BEGIN -->",
                                      "<!-- CODEX_CONTRACT_END -->")
                  required_brief = ("## Task", "## Scope", "## Sandbox tier",
                                    "## Constraints", "## Non-goals",
                                    "## Acceptance criteria", "## Self-check",
                                    "## Report format")
                  required_report = ("## Status", "## Files changed",
                                     "## Brief mismatches", "## Open questions")
                  for marker in required_markers + required_brief + required_report:
                      if marker not in content:
                          print(f"FAIL: {path} missing required marker '{marker}'", file=sys.stderr)
                          bad += 1
              print(f"{path}: OK")
          if not found_code_writer:
              print("FAIL: personas/code-writer.md must exist (the sanctioned persona)", file=sys.stderr)
              bad += 1
          if bad:
              sys.exit(1)
          PY

      - name: shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y shellcheck
          shellcheck scripts/*.sh
          echo "shellcheck: OK"

      - name: Check SKILL.md line count (soft limit)
        run: |
          lines=$(wc -l < skills/codex-subagent/SKILL.md)
          echo "SKILL.md is $lines lines"
          if [ "$lines" -gt 600 ]; then
            echo "WARN: SKILL.md is over 600 lines; consider splitting reference material into subfiles"
          fi
